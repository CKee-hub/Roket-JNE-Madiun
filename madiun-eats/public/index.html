<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#78350f" />
    <meta name="description" content="MadiunEats - Kuliner lokal Madiun, pesan langsung ke warungnya" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>MadiunEats 🛵</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #fffbf5; font-family: 'Plus Jakarta Sans', sans-serif; }
      @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
      @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
      input::placeholder, textarea::placeholder { color: #9ca3af; }
      input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.4; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #d4a96a44; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
